  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.jsx"></script>
    <script>
      // Dynamically switch favicon based on user's color scheme preference
      (function () {
        const favicon =
          document.getElementById("favicon") ||
          (() => {
            const l = document.createElement("link");
            l.id = "favicon";
            l.rel = "icon";
            document.head.appendChild(l);
            return l;
          })();

        function setFavicon(isDark) {
          favicon.href = isDark ? "k-log-tr-v1.png" : "k_logo_black.png";
        }

        const mql = window.matchMedia("(prefers-color-scheme: dark)");
        setFavicon(mql.matches);

        // Listen for changes (supports addEventListener and addListener)
        if (mql.addEventListener) {
          mql.addEventListener("change", (e) => setFavicon(e.matches));
        } else if (mql.addListener) {
          mql.addListener((e) => setFavicon(e.matches));
        }
      })();
    </script>
  </body>
